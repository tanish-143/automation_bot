# ═══════════════════════════════════════════════════════════════════════
# Market Scanner — CI/CD Pipeline
# Triggers: push to main, PRs → lint + test + build
# Deploy: on push to main → build Docker image → deploy to Cloud Run
# ═══════════════════════════════════════════════════════════════════════

name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "22"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/scanner

jobs:
  # ── Lint & Test — Python Backend ────────────────────────────────────
  backend-check:
    name: Backend Lint + Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crypto/stock market scanner

    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_USER: scanner
          POSTGRES_PASSWORD: scanner
          POSTGRES_DB: scanner_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U scanner"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: "crypto/stock market scanner/backend/requirements.txt"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install ruff pytest pytest-asyncio httpx

      - name: Lint (ruff)
        run: ruff check backend/ crypto/

      - name: Type check (optional — pyright)
        continue-on-error: true
        run: |
          pip install pyright
          pyright backend/

      - name: Run unit tests
        env:
          SCANNER_DATABASE_URL: postgresql+asyncpg://scanner:scanner@localhost:5432/scanner_test
          SCANNER_DATABASE_URL_SYNC: postgresql://scanner:scanner@localhost:5432/scanner_test
          SCANNER_REDIS_URL: redis://localhost:6379/0
        run: pytest crypto/test_detection_rules.py -v --tb=short

  # ── Lint & Build — Frontend ──────────────────────────────────────────
  frontend-check:
    name: Frontend Lint + Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crypto/stock market scanner/frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: "crypto/stock market scanner/frontend/package-lock.json"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: TypeScript compile
        run: npx tsc -b --noEmit

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: crypto/stock market scanner/frontend/dist/
          retention-days: 7

  # ── Docker Build & Push ──────────────────────────────────────────────
  docker-build:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [backend-check, frontend-check]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: crypto/stock market scanner
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy to GCP Cloud Run ──────────────────────────────────────────
  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy API to Cloud Run
        run: |
          gcloud run deploy scanner-api \
            --image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --region us-central1 \
            --platform managed \
            --allow-unauthenticated \
            --port 8000 \
            --memory 1Gi \
            --cpu 2 \
            --min-instances 1 \
            --max-instances 10 \
            --set-env-vars "SCANNER_ENV=production" \
            --set-secrets "SCANNER_DATABASE_URL=scanner-db-url:latest,SCANNER_REDIS_URL=scanner-redis-url:latest,SCANNER_SLACK_WEBHOOK_URL=scanner-slack-url:latest"
