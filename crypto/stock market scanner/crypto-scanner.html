<script type="text/babel" data-type="module">
const { useState, useEffect, useMemo, useCallback, useRef, memo, createContext, useContext } = React;

/* ── Binance Public API ─────────────────────────────────── */
const BINANCE_API = 'https://api.binance.com';

async function fetchTicker24h() {
  const res = await fetch(`${BINANCE_API}/api/v3/ticker/24hr`);
  if (!res.ok) throw new Error('Binance API error');
  const data = await res.json();
  // Filter USDT pairs, sort by quote volume, take top 100
  return data
    .filter(t => t.symbol.endsWith('USDT') && parseFloat(t.quoteVolume) > 100000)
    .sort((a, b) => parseFloat(b.quoteVolume) - parseFloat(a.quoteVolume))
    .slice(0, 100)
    .map((t, i) => ({
      symbol_id: i + 1,
      symbol: t.symbol.replace('USDT', '/USDT'),
      exchange: 'binance',
      asset_class: 'crypto',
      current_price: parseFloat(t.lastPrice),
      price_change_pct_24h: parseFloat(t.priceChangePercent),
      volume_24h: parseFloat(t.quoteVolume),
      volume_ratio: null,
      realized_volatility: null,
      volatility_percentile: null,
      composite_score: null,
      high_24h: parseFloat(t.highPrice),
      low_24h: parseFloat(t.lowPrice),
      sparkline: [],
      raw_symbol: t.symbol,
    }));
}

async function fetchKlines(rawSymbol, interval = '1h', limit = 24) {
  const res = await fetch(
    `${BINANCE_API}/api/v3/klines?symbol=${rawSymbol}&interval=${interval}&limit=${limit}`
  );
  if (!res.ok) return [];
  const data = await res.json();
  return data.map(k => parseFloat(k[4])); // close prices
}

async function fetchOHLCV(rawSymbol, interval = '4h', limit = 100) {
  const res = await fetch(
    `${BINANCE_API}/api/v3/klines?symbol=${rawSymbol}&interval=${interval}&limit=${limit}`
  );
  if (!res.ok) return null;
  const data = await res.json();
  return data.map(k => ({
    ts: k[0],
    open: parseFloat(k[1]),
    high: parseFloat(k[2]),
    low: parseFloat(k[3]),
    close: parseFloat(k[4]),
    volume: parseFloat(k[5]),
  }));
}

/* ── Delta Exchange Public API (No API Key) ─────────────── */
const DELTA_API = 'https://api.delta.exchange';

async function fetchDeltaTickers() {
  try {
    const res = await fetch(`${DELTA_API}/v2/tickers`);
    if (!res.ok) throw new Error(`Delta API ${res.status}`);
    const json = await res.json();
    if (!json.success) throw new Error('Delta API returned success=false');
    const tickers = json.result || [];
    // Filter: must have a price, decent volume, and be perpetual_futures or spot
    const validTypes = new Set(['perpetual_futures', 'spot']);
    return tickers
      .filter(t => {
        if (!t.symbol) return false;
        if (!validTypes.has(t.contract_type)) return false;
        const price = parseFloat(t.close || t.mark_price || 0);
        if (price <= 0) return false;
        const vol = parseFloat(t.turnover_usd || 0);
        if (vol < 1000) return false;
        return true;
      })
      .sort((a, b) => parseFloat(b.turnover_usd || 0) - parseFloat(a.turnover_usd || 0))
      .slice(0, 200)
      .map((t, i) => {
        const close = parseFloat(t.close || t.mark_price);
        const markPrice = parseFloat(t.mark_price || close);
        const changePct = parseFloat(t.ltp_change_24h || 0);
        // Normalize symbol for display: "BTCUSDT" → "BTC/USDT", "XRP_USDT" → "XRP/USDT"
        let displaySymbol = t.symbol.replace('_', '');
        if (displaySymbol.endsWith('USDT')) displaySymbol = displaySymbol.replace('USDT', '/USDT');
        else if (displaySymbol.endsWith('USDC')) displaySymbol = displaySymbol.replace('USDC', '/USDC');
        else if (displaySymbol.endsWith('USD')) displaySymbol = displaySymbol.replace('USD', '/USD');
        // Prefix with Δ to distinguish from Binance when same pair exists
        displaySymbol = 'Δ' + displaySymbol;

        // Extra Delta data
        const spreadPct = t.quotes ? (() => {
          const ask = parseFloat(t.quotes.best_ask || 0);
          const bid = parseFloat(t.quotes.best_bid || 0);
          return ask > 0 && bid > 0 ? +((ask - bid) / ask * 100).toFixed(4) : null;
        })() : null;
        const bestBid = t.quotes ? parseFloat(t.quotes.best_bid || 0) || null : null;
        const bestAsk = t.quotes ? parseFloat(t.quotes.best_ask || 0) || null : null;
        const bidSize = t.quotes ? parseFloat(t.quotes.bid_size || 0) || null : null;
        const askSize = t.quotes ? parseFloat(t.quotes.ask_size || 0) || null : null;

        return {
          symbol_id: 10000 + i,
          symbol: displaySymbol,
          exchange: 'delta',
          asset_class: 'crypto',
          current_price: close,
          price_change_pct_24h: +changePct.toFixed(2),
          volume_24h: parseFloat(t.turnover_usd || 0),
          volume_ratio: null,
          realized_volatility: null,
          volatility_percentile: null,
          composite_score: null,
          high_24h: parseFloat(t.high || close),
          low_24h: parseFloat(t.low || close),
          sparkline: [],
          raw_symbol: t.symbol,
          delta_product_id: t.product_id,
          contract_type: t.contract_type === 'perpetual_futures' ? 'perp' : t.contract_type,
          open_interest: t.oi ? parseFloat(t.oi) : null,
          open_interest_usd: t.oi_value_usd ? parseFloat(t.oi_value_usd) : null,
          oi_change_6h: t.oi_change_usd_6h ? parseFloat(t.oi_change_usd_6h) : null,
          mark_price: markPrice,
          mark_change_24h: t.mark_change_24h ? parseFloat(t.mark_change_24h) : null,
          spot_price: t.spot_price ? parseFloat(t.spot_price) : null,
          basis_pct: (markPrice && t.spot_price && parseFloat(t.spot_price) > 0) ? +((markPrice - parseFloat(t.spot_price)) / parseFloat(t.spot_price) * 100).toFixed(4) : null,
          spread_pct: spreadPct,
          best_bid: bestBid,
          best_ask: bestAsk,
          bid_size: bidSize,
          ask_size: askSize,
          turnover_symbol: t.turnover_symbol || 'USDT',
          product_status: t.product_trading_status || null,
          description: t.description || null,
        };
      });
  } catch (err) {
    console.warn('Delta Exchange fetch failed:', err.message);
    return [];
  }
}

async function fetchDeltaProducts() {
  try {
    const res = await fetch(`${DELTA_API}/v2/products?contract_types=perpetual_futures&page_size=200`);
    if (!res.ok) throw new Error(`Delta products API ${res.status}`);
    const json = await res.json();
    if (!json.result) return {};
    const map = {};
    for (const p of json.result) {
      if (!p.symbol) continue;
      const si = p.spot_index || {};
      map[p.symbol] = {
        annualized_funding: p.annualized_funding != null ? parseFloat(p.annualized_funding) : null,
        default_leverage: p.default_leverage != null ? parseFloat(p.default_leverage) : null,
        initial_margin: p.initial_margin != null ? parseFloat(p.initial_margin) : null,
        maintenance_margin: p.maintenance_margin != null ? parseFloat(p.maintenance_margin) : null,
        maker_fee: p.maker_commission_rate != null ? parseFloat(p.maker_commission_rate) : null,
        taker_fee: p.taker_commission_rate != null ? parseFloat(p.taker_commission_rate) : null,
        contract_value: p.contract_value != null ? parseFloat(p.contract_value) : null,
        tick_size: p.tick_size != null ? parseFloat(p.tick_size) : null,
        funding_method: p.funding_method || null,
        impact_size: p.impact_size != null ? parseFloat(p.impact_size) : null,
        spot_index_symbol: si.symbol || null,
        constituent_exchanges: (si.constituent_exchanges || []).map(c => c.exchange).filter(Boolean),
      };
    }
    return map;
  } catch (err) {
    console.warn('Delta products fetch failed:', err.message);
    return {};
  }
}

async function fetchDeltaTickerDetail(symbol) {
  try {
    const res = await fetch(`${DELTA_API}/v2/tickers/${symbol}`);
    if (!res.ok) return null;
    const json = await res.json();
    if (!json.success || !json.result) return null;
    const t = json.result;
    return {
      funding_rate: t.funding_rate != null ? parseFloat(t.funding_rate) : null,
      mark_basis: t.mark_basis != null ? parseFloat(t.mark_basis) : null,
      open_price: t.open != null ? parseFloat(t.open) : null,
      volume_base: t.volume != null ? parseFloat(t.volume) : null,
      size_contracts: t.size != null ? parseFloat(t.size) : null,
      leverage: t.leverage != null ? parseFloat(t.leverage) : null,
      tags: t.tags || [],
      top_tag: t.top_tag || null,
      greeks: t.greeks || null,
    };
  } catch {
    return null;
  }
}

async function fetchDeltaOrderbook(symbol) {
  try {
    const res = await fetch(`${DELTA_API}/v2/l2orderbook/${symbol}`);
    if (!res.ok) return null;
    const json = await res.json();
    if (!json.success || !json.result) return null;
    const r = json.result;
    const buys = (r.buy || []).slice(0, 20);
    const sells = (r.sell || []).slice(0, 20);
    const bidDepth = buys.reduce((s, b) => s + (parseFloat(b.size) || 0), 0);
    const askDepth = sells.reduce((s, b) => s + (parseFloat(b.size) || 0), 0);
    // Find walls (levels with size > 3x average)
    const avgBid = bidDepth / (buys.length || 1);
    const avgAsk = askDepth / (sells.length || 1);
    const bidWalls = buys.filter(b => parseFloat(b.size) > avgBid * 3).map(b => ({ price: parseFloat(b.price), size: parseFloat(b.size) }));
    const askWalls = sells.filter(s => parseFloat(s.size) > avgAsk * 3).map(s => ({ price: parseFloat(s.price), size: parseFloat(s.size) }));
    return {
      bid_depth_20: bidDepth,
      ask_depth_20: askDepth,
      bid_ask_ratio: askDepth > 0 ? +(bidDepth / askDepth).toFixed(3) : null,
      bid_levels: buys.length,
      ask_levels: sells.length,
      bid_walls: bidWalls.slice(0, 3),
      ask_walls: askWalls.slice(0, 3),
      imbalance: askDepth > 0 ? +(((bidDepth - askDepth) / (bidDepth + askDepth)) * 100).toFixed(2) : null,
    };
  } catch {
    return null;
  }
}

async function fetchDeltaRecentTrades(symbol) {
  try {
    const res = await fetch(`${DELTA_API}/v2/trades/${symbol}`);
    if (!res.ok) return null;
    const json = await res.json();
    if (!json.success || !json.result) return null;
    const trades = json.result;
    let buyVol = 0, sellVol = 0, buyCount = 0, sellCount = 0;
    let bigTrades = [];
    const avgSize = trades.reduce((s, t) => s + (parseFloat(t.size) || 0), 0) / (trades.length || 1);
    for (const t of trades) {
      const size = parseFloat(t.size) || 0;
      const price = parseFloat(t.price) || 0;
      if (t.buyer_role === 'taker') { buyVol += size; buyCount++; }
      else { sellVol += size; sellCount++; }
      if (size > avgSize * 3) bigTrades.push({ price, size, side: t.buyer_role === 'taker' ? 'buy' : 'sell' });
    }
    return {
      total_trades: trades.length,
      buy_volume: buyVol,
      sell_volume: sellVol,
      buy_count: buyCount,
      sell_count: sellCount,
      buy_pct: trades.length > 0 ? +((buyCount / trades.length) * 100).toFixed(1) : 50,
      sell_pct: trades.length > 0 ? +((sellCount / trades.length) * 100).toFixed(1) : 50,
      big_trades: bigTrades.slice(0, 5),
      net_flow: buyVol - sellVol,
    };
  } catch {
    return null;
  }
}

async function fetchDeltaKlines(symbol, resolution = '1h', limit = 24) {
  try {
    const end = Math.floor(Date.now() / 1000);
    // Resolution map for Delta: 1m,5m,15m,30m,1h,2h,4h,6h,1d,1w
    const resMap = { '1m':'1m', '5m':'5m', '15m':'15m', '1h':'1h', '4h':'4h', '1d':'1d' };
    const res = resolution in resMap ? resMap[resolution] : '1h';
    const seconds = { '1m':60,'5m':300,'15m':900,'1h':3600,'4h':14400,'1d':86400 };
    const start = end - (seconds[res] || 3600) * limit;
    const resp = await fetch(
      `${DELTA_API}/v2/history/candles?resolution=${res}&symbol=${symbol}&start=${start}&end=${end}`
    );
    if (!resp.ok) return [];
    const json = await resp.json();
    const candles = json.result || [];
    return candles.map(c => parseFloat(c.close)).filter(v => v > 0);
  } catch {
    return [];
  }
}

async function fetchDeltaOHLCV(symbol, resolution = '4h', limit = 100) {
  try {
    const end = Math.floor(Date.now() / 1000);
    const seconds = { '1m':60,'5m':300,'15m':900,'1h':3600,'4h':14400,'1d':86400 };
    const sec = seconds[resolution] || 14400;
    const start = end - sec * limit;
    const resp = await fetch(
      `${DELTA_API}/v2/history/candles?resolution=${resolution}&symbol=${symbol}&start=${start}&end=${end}`
    );
    if (!resp.ok) return null;
    const json = await resp.json();
    const candles = json.result || [];
    if (candles.length === 0) return null;
    return candles.map(c => ({
      ts: c.time * 1000,
      open: parseFloat(c.open),
      high: parseFloat(c.high),
      low: parseFloat(c.low),
      close: parseFloat(c.close),
      volume: parseFloat(c.volume || 0),
    })).filter(c => c.close > 0);
  } catch {
    return null;
  }
}

/* ── Simple State Store (like Zustand) ──────────────────── */
let storeState = {
  symbols: [],
  filters: {
    session: 'all', timeframe: '1h', volumeRatioMin: 1,
    volatilityPctMin: 0, minVolume: 10000, exchange: 'all', assetClass: 'all',
  },
  selectedSymbol: null,
  detailOpen: false,
};
const listeners = new Set();
function useStore(selector) {
  const [val, setVal] = useState(() => selector(storeState));
  useEffect(() => {
    const cb = () => {
      const next = selector(storeState);
      setVal(prev => {
        if (prev === next) return prev;
        if (Array.isArray(prev) && Array.isArray(next) && prev.length === next.length && prev.every((v,i) => v === next[i])) return prev;
        return next;
      });
    };
    listeners.add(cb);
    return () => listeners.delete(cb);
  }, []);
  return val;
}
function setStore(updater) {
  if (typeof updater === 'function') storeState = { ...storeState, ...updater(storeState) };
  else storeState = { ...storeState, ...updater };
  listeners.forEach(cb => cb());
}

/* ── Utility Functions ──────────────────────────────────── */
function fmt(n, decimals = 2) {
  if (n == null) return '—';
  if (Math.abs(n) >= 1e9) return `${(n / 1e9).toFixed(1)}B`;
  if (Math.abs(n) >= 1e6) return `${(n / 1e6).toFixed(1)}M`;
  if (Math.abs(n) >= 1e3) return `${(n / 1e3).toFixed(1)}K`;
  return n.toFixed(decimals);
}
function fmtPrice(n) {
  if (n == null) return '—';
  if (n >= 1) return n.toLocaleString(undefined, { maximumFractionDigits: 2 });
  if (n >= 0.01) return n.toFixed(4);
  return n.toPrecision(4);
}
function pctClass(v) {
  if (v == null) return 'text-zinc-500';
  return v >= 0 ? 'text-emerald-400' : 'text-red-400';
}

/* ── SVG Sparkline Component ────────────────────────────── */
const Sparkline = memo(function Sparkline({ data, width = 80, height = 28, positive }) {
  if (!data || data.length < 2) return <span className="text-zinc-600">—</span>;
  const min = Math.min(...data);
  const max = Math.max(...data);
  const range = max - min || 1;
  const points = data.map((v, i) => {
    const x = (i / (data.length - 1)) * width;
    const y = height - ((v - min) / range) * (height - 4) - 2;
    return `${x},${y}`;
  }).join(' ');
  const color = positive === undefined ? '#6366f1' : positive ? '#22c55e' : '#ef4444';
  return (
    <svg width={width} height={height} viewBox={`0 0 ${width} ${height}`}>
      <polyline fill="none" stroke={color} strokeWidth="1.5" points={points} />
    </svg>
  );
});

/* ── FilterPanel Component ──────────────────────────────── */
function FilterPanel() {
  const filters = useStore(s => s.filters);
  const symbols = useStore(s => s.symbols);

  const setFilters = (patch) => setStore(s => ({ filters: { ...s.filters, ...patch } }));

  const filtered = useMemo(() => {
    return symbols.filter(row => {
      if (row.volume_24h != null && row.volume_24h < filters.minVolume) return false;
      if (row.volume_ratio != null && row.volume_ratio > 0 && row.volume_ratio < filters.volumeRatioMin) return false;
      if (filters.exchange !== 'all' && row.exchange !== filters.exchange) return false;
      if (filters.assetClass !== 'all' && row.asset_class !== filters.assetClass) return false;
      return true;
    });
  }, [symbols, filters]);

  const spikeCounts = useMemo(() => {
    let volatileCoins = 0;
    for (const s of symbols) {
      if (s.price_change_pct_24h != null && Math.abs(s.price_change_pct_24h) >= 5) volatileCoins++;
    }
    return { volatileCoins };
  }, [symbols]);

  const defaults = { session: 'all', timeframe: '1h', volumeRatioMin: 1, volatilityPctMin: 0, minVolume: 10000, exchange: 'all', assetClass: 'all' };
  const activeCount = Object.keys(defaults).reduce((n, k) => n + (filters[k] !== defaults[k] ? 1 : 0), 0);

  return (
    <aside className="w-64 shrink-0 border-r border-zinc-800 p-4 space-y-5 overflow-y-auto bg-zinc-950 max-lg:hidden">
      <div className="flex items-center justify-between">
        <h2 className="text-sm font-semibold text-zinc-400 uppercase tracking-wider">Filters</h2>
        {activeCount > 0 && (
          <button onClick={() => setFilters(defaults)}
            className="text-[10px] px-2 py-0.5 rounded bg-zinc-800 text-zinc-400 hover:bg-zinc-700 hover:text-zinc-200 transition-colors">
            Reset ({activeCount})
          </button>
        )}
      </div>

      <div className="text-[11px] text-zinc-500">
        Showing <span className="text-indigo-400 font-semibold">{filtered.length}</span> of {symbols.length} coins
      </div>

      {spikeCounts.volatileCoins > 0 && (
        <div className="flex items-center gap-2 px-2.5 py-1.5 rounded-md bg-rose-500/10 border border-rose-500/20">
          <span className="text-sm">🌊</span>
          <span className="text-[11px] text-rose-400 font-medium">
            {spikeCounts.volatileCoins} volatile (≥5% 24h)
          </span>
        </div>
      )}

      <fieldset>
        <legend className="text-xs text-zinc-500 mb-1.5">Session</legend>
        <div className="flex flex-wrap gap-1.5">
          {[{v:'all',l:'All'},{v:'asia',l:'🌏 Asia'},{v:'europe',l:'🌍 EU'},{v:'us',l:'🌎 US'}].map(s => (
            <button key={s.v} onClick={() => setFilters({ session: s.v })}
              className={`px-2.5 py-1 rounded text-xs font-medium transition ${
                filters.session === s.v ? 'bg-indigo-600 text-white' : 'bg-zinc-800 text-zinc-400 hover:bg-zinc-700'}`}>
              {s.l}
            </button>
          ))}
        </div>
      </fieldset>

      <fieldset>
        <legend className="text-xs text-zinc-500 mb-1.5">Timeframe</legend>
        <div className="flex flex-wrap gap-1.5">
          {['1m','5m','15m','1h','4h','1d'].map(tf => (
            <button key={tf} onClick={() => setFilters({ timeframe: tf })}
              className={`px-2.5 py-1 rounded text-xs font-medium transition ${
                filters.timeframe === tf ? 'bg-indigo-600 text-white' : 'bg-zinc-800 text-zinc-400 hover:bg-zinc-700'}`}>
              {tf}
            </button>
          ))}
        </div>
      </fieldset>

      <fieldset>
        <legend className="text-xs text-zinc-500 mb-1.5">
          Min 24h Volume ($) <span className="text-indigo-400 font-semibold">{fmt(filters.minVolume)}</span>
        </legend>
        <input type="range" min={0} max={5000000} step={50000}
          value={filters.minVolume} onChange={e => setFilters({ minVolume: +e.target.value })}
          className="w-full accent-indigo-500" />
        <div className="flex justify-between text-[10px] text-zinc-600"><span>$0</span><span>$5M</span></div>
      </fieldset>

      <fieldset>
        <legend className="text-xs text-zinc-500 mb-1.5">Exchange</legend>
        <div className="flex flex-wrap gap-1.5">
          {[{v:'all',l:'All',icon:''},{v:'binance',l:'Binance',icon:'🟡'},{v:'delta',l:'Delta',icon:'🔺'}].map(ex => (
            <button key={ex.v} onClick={() => setFilters({ exchange: ex.v })}
              className={`px-2.5 py-1 rounded text-xs font-medium transition ${
                filters.exchange === ex.v ? 'bg-indigo-600 text-white' : 'bg-zinc-800 text-zinc-400 hover:bg-zinc-700'}`}>
              {ex.icon} {ex.l}
            </button>
          ))}
        </div>
      </fieldset>

      <fieldset>
        <legend className="text-xs text-zinc-500 mb-1.5">Asset Class</legend>
        <div className="flex gap-1.5">

function ScannerTable() {
  const symbols = useStore(s => s.symbols);
  const filters = useStore(s => s.filters);

  const filtered = useMemo(() => {
    return symbols.filter(row => {
      if (row.volume_24h != null && row.volume_24h < filters.minVolume) return false;
      if (filters.exchange !== 'all' && row.exchange !== filters.exchange) return false;
      if (filters.assetClass !== 'all' && row.asset_class !== filters.assetClass) return false;
      return true;
    });
  }, [symbols, filters]);

  const [sortKey, setSortKey] = useState('volume_24h');
  const [sortDesc, setSortDesc] = useState(true);

  const sorted = useMemo(() => {
    const copy = [...filtered];
    copy.sort((a, b) => {
      const av = a[sortKey] ?? -Infinity;
      const bv = b[sortKey] ?? -Infinity;
      return sortDesc ? (bv > av ? 1 : -1) : (av > bv ? 1 : -1);
    });
    return copy;
  }, [filtered, sortKey, sortDesc]);

  const toggleSort = (key) => {
    if (sortKey === key) setSortDesc(d => !d);
    else { setSortKey(key); setSortDesc(true); }
  };
  const sortIcon = (key) => sortKey === key ? (sortDesc ? ' ▼' : ' ▲') : '';

  const openDetail = (row) => setStore({ selectedSymbol: row, detailOpen: true });

  return (
    <div className="overflow-x-auto">
      <table className="w-full text-sm">
        <thead className="sticky top-0 bg-zinc-900 z-10">
          <tr className="text-zinc-500 text-xs uppercase tracking-wider">
            {[
              { key: 'symbol', label: 'Symbol' },
              { key: 'current_price', label: 'Price' },
              { key: 'price_change_pct_24h', label: '24h %' },
              { key: 'volume_24h', label: 'Volume 24h' },
              { key: 'high_24h', label: '24h High' },
              { key: 'low_24h', label: '24h Low' },
            ].map(({ key, label }) => (
              <th key={key} onClick={() => toggleSort(key)}
                className="px-3 py-2 text-left cursor-pointer hover:text-zinc-300 select-none">
                {label}{sortIcon(key)}
              </th>
            ))}
            <th className="px-3 py-2 text-left">Spark / Fund</th>
          </tr>
        </thead>
        <tbody>
          {sorted.map(row => (
            <SymbolRowComponent key={row.symbol} row={row} onClick={() => openDetail(row)} />
          ))}
          {sorted.length === 0 && (
            <tr><td colSpan={7} className="text-center py-12 text-zinc-600">Loading market data...</td></tr>
          )}
        </tbody>
      </table>
    </div>
  );
}

/* ── Heatmap Component ──────────────────────────────────── */
function scoreColor(pct) {
  if (pct == null) return 'rgba(63,63,70,0.5)';
  if (pct >= 10) return 'rgba(34,197,94,0.6)';
  if (pct >= 5) return 'rgba(34,197,94,0.35)';
  if (pct >= 2) return 'rgba(245,158,11,0.3)';
  if (pct >= 0) return 'rgba(148,163,184,0.15)';
  if (pct >= -2) return 'rgba(148,163,184,0.1)';
  if (pct >= -5) return 'rgba(239,68,68,0.25)';
  return 'rgba(239,68,68,0.5)';
}

const HeatmapTile = memo(function HeatmapTile({ row, isVolatile, onClick }) {
  const changePct = row.price_change_pct_24h;
  const bgColor = scoreColor(changePct);
  const borderColor = isVolatile ? 'rgba(239,68,68,0.35)' : 'rgba(63,63,70,0.3)';
  return (
    <button data-symbol={row.symbol} onClick={onClick}
      className={`relative rounded-lg p-2 text-center cursor-pointer transition-all duration-200 ease-out hover:scale-110 hover:z-20 active:scale-100 ${isVolatile ? 'volatile-tile' : ''}`}
      style={{ backgroundColor: bgColor, border: `1px solid ${borderColor}` }}>
      {isVolatile && <span className="absolute -top-1 -right-1 w-2 h-2 rounded-full bg-rose-500 volatile-dot" />}
      {row.exchange === 'delta' && <span className="absolute -top-1 -left-1 text-[8px]">🔺</span>}
      <div className="text-[11px] font-bold truncate text-zinc-200">
        {row.symbol.replace('/USDT', '').replace('/USD', '')}
      </div>
      <div className="text-[10px] font-mono font-semibold"
        style={{ color: changePct != null && changePct >= 0 ? '#4ade80' : '#f87171' }}>
        {changePct != null ? `${changePct >= 0 ? '+' : ''}${changePct.toFixed(1)}%` : '—'}
      </div>
      <div className="text-[9px] text-zinc-500 mt-0.5">${fmt(row.volume_24h, 0)}</div>
    </button>
  );
});

function Heatmap() {
  const symbols = useStore(s => s.symbols);
  const filters = useStore(s => s.filters);

  const filtered = useMemo(() => {
    return symbols.filter(row => {
      if (row.volume_24h != null && row.volume_24h < filters.minVolume) return false;
      return true;
    });
  }, [symbols, filters]);

  const tiles = useMemo(() =>
    [...filtered].sort((a, b) => Math.abs(b.price_change_pct_24h ?? 0) - Math.abs(a.price_change_pct_24h ?? 0)).slice(0, 100),
    [filtered]
  );

  const volatileSet = useMemo(() =>
    new Set(tiles.filter(t => t.price_change_pct_24h != null && Math.abs(t.price_change_pct_24h) >= 5).map(c => c.symbol)),
    [tiles]
  );

  const [hovered, setHovered] = useState(null);
  const containerRef = useRef(null);

  const openDetail = (row) => setStore({ selectedSymbol: row, detailOpen: true });

  return (
    <div ref={containerRef} className="p-4 relative">
      <div className="flex items-center justify-between mb-3">
        <div className="flex items-center gap-3">
          <h3 className="text-xs font-semibold text-zinc-500 uppercase tracking-wider">🔥 Heatmap — Top {tiles.length}</h3>
          {volatileSet.size > 0 && (
            <span className="text-[10px] px-2 py-0.5 rounded-full bg-rose-500/20 text-rose-400 border border-rose-500/30 anim-pulse">
              {volatileSet.size} volatile
            </span>
          )}
        </div>
        <div className="flex items-center gap-3 text-[10px] text-zinc-600">
          <span className="flex items-center gap-1"><span className="w-3 h-3 rounded-sm" style={{backgroundColor:'rgba(239,68,68,0.5)'}} />Bearish</span>
          <span className="flex items-center gap-1"><span className="w-3 h-3 rounded-sm" style={{backgroundColor:'rgba(148,163,184,0.15)'}} />Neutral</span>
          <span className="flex items-center gap-1"><span className="w-3 h-3 rounded-sm" style={{backgroundColor:'rgba(34,197,94,0.6)'}} />Bullish</span>
        </div>
      </div>
      <div className="grid grid-cols-[repeat(auto-fill,minmax(88px,1fr))] gap-1.5">
        {tiles.map(row => (
          <HeatmapTile key={row.symbol} row={row} isVolatile={volatileSet.has(row.symbol)}
            onClick={() => openDetail(row)} />
        ))}
      </div>
    </div>
  );
}

/* ── Detail Modal ───────────────────────────────────────── */
function DetailModal() {
  const detailOpen = useStore(s => s.detailOpen);
  const selectedSymbol = useStore(s => s.selectedSymbol);
  const close = () => setStore({ detailOpen: false, selectedSymbol: null });

  const [snapshots, setSnapshots] = useState([]);
  const [loading, setLoading] = useState(false);
  const [deltaDetail, setDeltaDetail] = useState(null);
  const [orderbook, setOrderbook] = useState(null);
  const [recentTrades, setRecentTrades] = useState(null);
  const [detailLoading, setDetailLoading] = useState(false);

  useEffect(() => {
    if (!detailOpen || !selectedSymbol) return;
    let cancelled = false;
    setLoading(true);
    setDeltaDetail(null);
    setOrderbook(null);
    setRecentTrades(null);

    const klFn = selectedSymbol.exchange === 'delta' ? fetchDeltaKlines : fetchKlines;
    klFn(selectedSymbol.raw_symbol, '1h', 48).then(prices => {
      if (!cancelled) setSnapshots(prices);
    }).catch(() => {
      if (!cancelled && selectedSymbol.sparkline?.length) setSnapshots(selectedSymbol.sparkline);
    }).finally(() => { if (!cancelled) setLoading(false); });

    // Fetch on-demand Delta data
    if (selectedSymbol.exchange === 'delta' && selectedSymbol.raw_symbol) {
      setDetailLoading(true);
      Promise.all([
        fetchDeltaTickerDetail(selectedSymbol.raw_symbol).catch(() => null),
        fetchDeltaOrderbook(selectedSymbol.raw_symbol).catch(() => null),
        fetchDeltaRecentTrades(selectedSymbol.raw_symbol).catch(() => null),
      ]).then(([detail, ob, trades]) => {
        if (!cancelled) {
          setDeltaDetail(detail);
          setOrderbook(ob);
          setRecentTrades(trades);
        }
      }).finally(() => { if (!cancelled) setDetailLoading(false); });
    }

    return () => { cancelled = true; };
  }, [detailOpen, selectedSymbol]);

  useEffect(() => {
    if (!detailOpen) return;
    const handler = e => { if (e.key === 'Escape') close(); };
    document.addEventListener('keydown', handler);
    return () => document.removeEventListener('keydown', handler);
  }, [detailOpen]);

  if (!detailOpen || !selectedSymbol) return null;
  const row = selectedSymbol;

  // Render chart as SVG
  const chartW = 580, chartH = 200;
  let chartSvg = null;
  if (snapshots.length >= 2) {
    const min = Math.min(...snapshots);
    const max = Math.max(...snapshots);
    const range = max - min || 1;
    const pts = snapshots.map((v, i) => {
      const x = (i / (snapshots.length - 1)) * chartW;
      const y = chartH - ((v - min) / range) * (chartH - 20) - 10;
      return `${x},${y}`;
    });
    const areaPath = `M0,${chartH} L${pts.map(p => p).join(' L')} L${chartW},${chartH} Z`;
    chartSvg = (
      <svg width="100%" height={chartH} viewBox={`0 0 ${chartW} ${chartH}`} preserveAspectRatio="none">
        <defs>
          <linearGradient id="chartGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor="rgba(59,130,246,0.3)" />
            <stop offset="100%" stopColor="rgba(59,130,246,0.02)" />
          </linearGradient>
        </defs>
        <path d={areaPath} fill="url(#chartGrad)" />
        <polyline fill="none" stroke="#3b82f6" strokeWidth="2" points={pts.join(' ')} />
      </svg>
    );
  }

  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm">
      <div className="absolute inset-0" onClick={close} />
      <div className="relative z-10 bg-zinc-900 border border-zinc-700 rounded-lg shadow-xl w-full max-w-3xl mx-4 max-h-[90vh] overflow-y-auto animate-in">
        <div className="flex items-center justify-between p-4 border-b border-zinc-800 sticky top-0 bg-zinc-900 z-10">
          <div className="flex items-center gap-2">
            <span className="text-lg font-bold text-zinc-100">{row.symbol}</span>
            <span className="text-sm text-zinc-500">{row.exchange}</span>
            {deltaDetail?.tags?.length > 0 && (
              <div className="flex gap-1">{deltaDetail.tags.map(tag => (
                <span key={tag} className="text-[9px] px-1.5 py-0.5 rounded bg-indigo-500/15 text-indigo-300 border border-indigo-500/20">{tag}</span>
              ))}</div>
            )}
          </div>
          <button onClick={close} className="text-zinc-500 hover:text-zinc-200 text-xl leading-none px-2">✕</button>
        </div>
        <div className="p-4">
          {loading ? (
            <div className="h-[200px] flex items-center justify-center text-zinc-600 text-sm">Loading chart…</div>
          ) : snapshots.length === 0 ? (
            <div className="h-[200px] flex items-center justify-center text-zinc-600 text-sm">No chart data</div>
          ) : (
            <div className="w-full bg-zinc-950 rounded-lg p-2">{chartSvg}</div>
          )}
        </div>

        {/* Basic Metrics */}
        <div className="grid grid-cols-2 sm:grid-cols-4 gap-3 p-4 border-t border-zinc-800">

          <MetricBox label="24h High" value={`$${fmtPrice(row.high_24h)}`} />

  );

/* ── Binance WebSocket for Real-Time Prices ─────────────── */
function useBinanceWebSocket() {
  const symbols = useStore(s => s.symbols);
  const [connected, setConnected] = useState(false);
  const wsRef = useRef(null);

  useEffect(() => {
    if (symbols.length === 0) return;

    // Connect to Binance WebSocket for all mini tickers
    const ws = new WebSocket('wss://stream.binance.com:9443/ws/!miniTicker@arr');
    wsRef.current = ws;

    ws.onopen = () => setConnected(true);
    ws.onclose = () => {
      setConnected(false);
      // Reconnect after 5s
      setTimeout(() => {
        if (wsRef.current === ws) useBinanceWebSocket();
      }, 5000);
    };
    ws.onerror = () => ws.close();

    let buffer = [];
    let timer = null;

    ws.onmessage = (ev) => {
      try {
        const tickers = JSON.parse(ev.data);
        for (const t of tickers) {
          if (t.s && t.s.endsWith('USDT')) {
            buffer.push({
              raw_symbol: t.s,
              symbol: t.s.replace('USDT', '/USDT'),
              current_price: parseFloat(t.c),
              volume_24h: parseFloat(t.q),
            });
          }
        }
      } catch {}

      if (!timer) {
        timer = setTimeout(() => {
          const updates = buffer;
          buffer = [];
          timer = null;
          if (updates.length === 0) return;

          setStore(s => {
            const map = new Map(s.symbols.map(r => [r.symbol, r]));
            let changed = false;
            for (const u of updates) {
              const existing = map.get(u.symbol);
              if (existing) {
                map.set(u.symbol, { ...existing, current_price: u.current_price, volume_24h: u.volume_24h });
                changed = true;
              }
            }
            return changed ? { symbols: Array.from(map.values()) } : {};
          });
        }, 1000);
      }
    };

    return () => {
      ws.close();
      wsRef.current = null;
    };
  }, [symbols.length > 0]); // Only reconnect when we first get symbols

  return connected;
}

   AI SETUP ENGINE — Elliott Wave + FVG + Trade Planning
   ══════════════════════════════════════════════════════════ */

/* ── Swing Point Detection ──────────────────────────────── */
function findSwingPoints(candles, lookback = 3) {
  const swings = [];
  for (let i = lookback; i < candles.length - lookback; i++) {
    let isHigh = true, isLow = true;
    for (let j = 1; j <= lookback; j++) {
      if (candles[i].high <= candles[i - j].high || candles[i].high <= candles[i + j].high) isHigh = false;
      if (candles[i].low >= candles[i - j].low || candles[i].low >= candles[i + j].low) isLow = false;
    }
    if (isHigh) swings.push({ type: 'high', price: candles[i].high, idx: i, ts: candles[i].ts });
    if (isLow) swings.push({ type: 'low', price: candles[i].low, idx: i, ts: candles[i].ts });
  }
  return swings;
}

/* ── Elliott Wave Detection (4H) ────────────────────────── */
function detectElliottWave(candles) {
  if (!candles || candles.length < 30) return { structure: 'unclear', count: 'N/A', current_wave: 'Insufficient data', confidence: 'Low', invalidation_level: 0 };

  const swings = findSwingPoints(candles, 3);
  if (swings.length < 5) return { structure: 'unclear', count: 'N/A', current_wave: 'Too few swing points', confidence: 'Low', invalidation_level: 0 };

  // Merge consecutive same-type swings keeping extreme
  const merged = [];
  for (const sw of swings) {
    if (merged.length && merged[merged.length - 1].type === sw.type) {
      const prev = merged[merged.length - 1];
      if ((sw.type === 'high' && sw.price > prev.price) || (sw.type === 'low' && sw.price < prev.price)) {
        merged[merged.length - 1] = sw;
      }
    } else {
      merged.push({ ...sw });
    }
  }

  // Need alternating H-L or L-H sequence
  const alt = [];
  for (const sw of merged) {
    if (!alt.length || alt[alt.length - 1].type !== sw.type) alt.push(sw);
    else {
      const prev = alt[alt.length - 1];
      if ((sw.type === 'high' && sw.price > prev.price) || (sw.type === 'low' && sw.price < prev.price))
        alt[alt.length - 1] = sw;
    }
  }

  // Try impulse (bullish 1-2-3-4-5)
  function tryBullishImpulse(pts) {
    for (let start = 0; start <= pts.length - 6; start++) {
      // Need: L H L H L H pattern (wave 0,1,2,3,4,5)
      const seq = pts.slice(start, start + 8); // look for pattern
      const lows = seq.filter(p => p.type === 'low');
      const highs = seq.filter(p => p.type === 'high');
      if (lows.length < 3 || highs.length < 3) continue;

      // Check basic rules: W0 < W1, W2 > W0, W2 < W1, W3 > W1, W4 > W2, W4 < W3, W5 > W3
      const w0 = lows[0], w1 = highs[0], w2 = lows[1], w3 = highs[1], w4 = lows[2], w5 = highs.length >= 3 ? highs[2] : null;

      if (w1.price > w0.price && w2.price > w0.price && w2.price < w1.price && w3.price > w1.price && w4.price > w2.price && w4.price < w3.price) {
        if (w5 && w5.price > w3.price) {
          return { structure: 'impulse', count: '1-2-3-4-5', current_wave: 'Wave 5 complete — watch for A-B-C correction', confidence: 'Medium', invalidation_level: w4.price, waves: [w0, w1, w2, w3, w4, w5] };
        }
        // In wave 5
        const lastPrice = candles[candles.length - 1].close;
        if (lastPrice > w3.price) {
          return { structure: 'impulse', count: '1-2-3-4-5', current_wave: 'Wave 5 in progress (above Wave 3 high)', confidence: 'Medium', invalidation_level: w4.price, waves: [w0, w1, w2, w3, w4] };
        }
        // In wave 4
        return { structure: 'impulse', count: '1-2-3-4', current_wave: 'Wave 4 pullback — potential Wave 5 rally ahead', confidence: 'Medium', invalidation_level: w2.price, waves: [w0, w1, w2, w3, w4] };
      }
    }
    return null;
  }

  // Try bearish impulse
  function tryBearishImpulse(pts) {
    for (let start = 0; start <= pts.length - 6; start++) {
      const seq = pts.slice(start);
      const highs = seq.filter(p => p.type === 'high');
      const lows = seq.filter(p => p.type === 'low');
      if (highs.length < 3 || lows.length < 3) continue;

      const w0 = highs[0], w1 = lows[0], w2 = highs[1], w3 = lows[1], w4 = highs[2], w5 = lows.length >= 3 ? lows[2] : null;

      if (w1.price < w0.price && w2.price < w0.price && w2.price > w1.price && w3.price < w1.price && w4.price < w2.price && w4.price > w3.price) {
        if (w5 && w5.price < w3.price) {
          return { structure: 'impulse', count: '1-2-3-4-5 (bearish)', current_wave: 'Bearish Wave 5 complete — potential reversal', confidence: 'Medium', invalidation_level: w4.price, waves: [w0, w1, w2, w3, w4, w5] };
        }
        const lastPrice = candles[candles.length - 1].close;
        if (lastPrice < w3.price) {
          return { structure: 'impulse', count: '1-2-3-4-5 (bearish)', current_wave: 'Bearish Wave 5 in progress', confidence: 'Medium', invalidation_level: w4.price, waves: [w0, w1, w2, w3, w4] };
        }
        return { structure: 'impulse', count: '1-2-3-4 (bearish)', current_wave: 'Bearish Wave 4 retrace — potential Wave 5 drop', confidence: 'Medium', invalidation_level: w2.price, waves: [w0, w1, w2, w3, w4] };
      }
    }
    return null;
  }

  // Try A-B-C correction
  function tryABC(pts) {
    if (pts.length < 3) return null;
    const last3 = pts.slice(-4);
    if (last3.length < 3) return null;

    // Bullish ABC (upward correction): H-L-H
    for (let i = 0; i <= last3.length - 3; i++) {
      const [a, b, c] = [last3[i], last3[i + 1], last3[i + 2]];
      if (a.type === 'high' && b.type === 'low' && c.type === 'high') {
        if (b.price < a.price && c.price < a.price && c.price > b.price) {
          return { structure: 'abc', count: 'A-B-C', current_wave: 'Corrective Wave C completing — bearish continuation likely', confidence: 'Medium', invalidation_level: a.price };
        }
      }
      // Bearish ABC: L-H-L
      if (a.type === 'low' && b.type === 'high' && c.type === 'low') {
        if (b.price > a.price && c.price > a.price && c.price < b.price) {
          return { structure: 'abc', count: 'A-B-C', current_wave: 'Corrective Wave C completing — bullish continuation likely', confidence: 'Medium', invalidation_level: a.price };
        }
      }
    }
    return null;
  }

  // Try all patterns
  let result = tryBullishImpulse(alt) || tryBearishImpulse(alt) || tryABC(alt);

  if (!result) {
    // Check basic trend for simple classification
    const recentClose = candles.slice(-10);
    const trend = recentClose[recentClose.length - 1].close - recentClose[0].close;
    const volatility = Math.max(...recentClose.map(c => c.high)) - Math.min(...recentClose.map(c => c.low));
    const avgRange = recentClose.reduce((s, c) => s + (c.high - c.low), 0) / recentClose.length;

    if (alt.length >= 3) {
      const last = alt.slice(-3);
      return {
        structure: 'unclear',
        count: `${alt.length} swings detected`,
        current_wave: `Trend ${trend > 0 ? 'bullish' : 'bearish'} bias — structure not clean enough for wave count`,
        confidence: 'Low',
        invalidation_level: trend > 0 ? Math.min(...last.map(s => s.price)) : Math.max(...last.map(s => s.price)),
      };
    }
    return { structure: 'unclear', count: 'N/A', current_wave: 'No clear wave structure', confidence: 'Low', invalidation_level: 0 };
  }

  // Refine confidence based on wave proportions
  if (result.waves && result.waves.length >= 5) {
    const w1Len = Math.abs(result.waves[1].price - result.waves[0].price);
    const w3Len = Math.abs(result.waves[3].price - result.waves[2].price);
    const w2Retrace = Math.abs(result.waves[2].price - result.waves[1].price) / w1Len;
    // Wave 3 should be longest, Wave 2 retrace 38-78% of Wave 1
    if (w3Len > w1Len && w2Retrace >= 0.3 && w2Retrace <= 0.8) {
      result.confidence = 'High';
      result.current_wave += ' (Fibonacci-aligned proportions)';
    }
  }

  return result;
}

/* ── Fair Value Gap (FVG) Detection (4H) ────────────────── */
function detectFVG(candles) {
  if (!candles || candles.length < 5) return [];
  const fvgs = [];

  for (let i = 2; i < candles.length; i++) {
    const c1 = candles[i - 2]; // first candle
    const c3 = candles[i];     // third candle

    // Bullish FVG: candle1.high < candle3.low → gap up
    if (c1.high < c3.low) {
      const low = c1.high;
      const high = c3.low;
      fvgs.push({ type: 'bullish', low, high, mid: (low + high) / 2, idx: i, ts: c3.ts, size: high - low });
    }
    // Bearish FVG: candle1.low > candle3.high → gap down
    if (c1.low > c3.high) {
      const high = c1.low;
      const low = c3.high;
      fvgs.push({ type: 'bearish', low, high, mid: (low + high) / 2, idx: i, ts: c3.ts, size: high - low });
    }
  }

  // Filter: keep only unfilled FVGs (price hasn't fully closed the gap since)
  const unfilled = [];
  for (const fvg of fvgs) {
    let filled = false;
    for (let j = fvg.idx + 1; j < candles.length; j++) {
      if (fvg.type === 'bullish' && candles[j].low <= fvg.low) { filled = true; break; }
      if (fvg.type === 'bearish' && candles[j].high >= fvg.high) { filled = true; break; }
    }
    if (!filled) unfilled.push(fvg);
  }

  // Sort by recency (most recent first), take top 5
  return unfilled.sort((a, b) => b.idx - a.idx).slice(0, 5);
}

/* ── Trade Setup Generator ──────────────────────────────── */
function generateTradeSetup(symbol, currentPrice, elliott, fvgs, candles) {
  const result = {
    symbol,
    elliott_4h: elliott,
    fvg_4h: fvgs.map(f => ({
      type: f.type,
      low: +f.low.toFixed(8),
      high: +f.high.toFixed(8),
      mid: +f.mid.toFixed(8),
      price_position: currentPrice < f.low ? 'below' : currentPrice > f.high ? 'above' : 'inside',
    })),
    long_setup: { status: 'NO TRADE', limit_entry: 0, stop_loss: 0, stop_limit: 0, tp1: 0, tp2: 0, rr_tp1: 0, rr_tp2: 0, reason: '' },
    short_setup: { status: 'NO TRADE', limit_entry: 0, stop_loss: 0, stop_limit: 0, tp1: 0, tp2: 0, rr_tp1: 0, rr_tp2: 0, reason: '' },
  };

  if (!candles || candles.length < 10) {
    result.long_setup.reason = 'Insufficient candle data';
    result.short_setup.reason = 'Insufficient candle data';
    return result;
  }

  // Calculate ATR for stop-limit spacing
  const atrCalc = candles.slice(-20);
  const avgTR = atrCalc.reduce((s, c, i) => {
    if (i === 0) return s;
    const tr = Math.max(c.high - c.low, Math.abs(c.high - atrCalc[i-1].close), Math.abs(c.low - atrCalc[i-1].close));
    return s + tr;
  }, 0) / (atrCalc.length - 1);

  const recent = candles.slice(-30);
  const recentHigh = Math.max(...recent.map(c => c.high));
  const recentLow = Math.min(...recent.map(c => c.low));
  const atr = recent.reduce((s, c) => s + (c.high - c.low), 0) / recent.length;
  const trueATR = typeof avgTR === 'number' ? avgTR : atr;

  // Find best bullish FVG for longs
  const bullishFVGs = fvgs.filter(f => f.type === 'bullish' && currentPrice >= f.low);
  const bearishFVGs = fvgs.filter(f => f.type === 'bearish' && currentPrice <= f.high);

  // LONG SETUP
  if (bullishFVGs.length > 0) {
    const bestFVG = bullishFVGs[0]; // most recent unfilled bullish FVG
    const entry = bestFVG.mid;
    const sl = bestFVG.low - atr * 0.5;
    const risk = entry - sl;
    const tp1 = entry + risk * 2;
    const tp2 = entry + risk * 3.5;

    // Validate with Elliott context
    let valid = true;
    let reason = `Long entry at bullish FVG midpoint $${fmtPrice(entry)}`;
    if (elliott.structure === 'impulse' && elliott.count.includes('bearish')) {
      if (elliott.current_wave.includes('Wave 5 in progress')) {
        valid = false;
        reason = 'Bearish impulse Wave 5 in progress — counter-trend long too risky';
      }
    }
    if (elliott.structure === 'impulse' && !elliott.count.includes('bearish')) {
      if (elliott.current_wave.includes('Wave 4 pullback')) {
        reason += ' — aligned with Wave 4 pullback into FVG for Wave 5 rally';
      }
    }

    if (valid && risk > 0) {
      // Stop-limit: trigger slightly above entry so the limit order only fires when price confirms direction
      const stopLimitTrigger = +(entry + trueATR * 0.15).toFixed(8);
      result.long_setup = {
        status: 'TRADE',
        limit_entry: +entry.toFixed(8),
        stop_loss: +sl.toFixed(8),
        stop_limit: stopLimitTrigger,
        tp1: +tp1.toFixed(8),
        tp2: +tp2.toFixed(8),
        rr_tp1: +((tp1 - entry) / risk).toFixed(2),
        rr_tp2: +((tp2 - entry) / risk).toFixed(2),
        reason,
      };
    } else {
      result.long_setup = { status: 'NO TRADE', limit_entry: 0, stop_loss: 0, stop_limit: 0, tp1: 0, tp2: 0, rr_tp1: 0, rr_tp2: 0, reason };
    }
  } else {
    result.long_setup.reason = 'No valid unfilled bullish FVG near current price';
  }

  // SHORT SETUP
  if (bearishFVGs.length > 0) {
    const bestFVG = bearishFVGs[0];
    const entry = bestFVG.mid;
    const sl = bestFVG.high + atr * 0.5;
    const risk = sl - entry;
    const tp1 = entry - risk * 2;
    const tp2 = entry - risk * 3.5;

    let valid = true;
    let reason = `Short entry at bearish FVG midpoint $${fmtPrice(entry)}`;
    if (elliott.structure === 'impulse' && !elliott.count.includes('bearish')) {
      if (elliott.current_wave.includes('Wave 5 in progress') || elliott.current_wave.includes('Wave 4 pullback')) {
        valid = false;
        reason = 'Bullish impulse in progress — counter-trend short too risky';
      }
    }
    if (elliott.structure === 'impulse' && elliott.count.includes('bearish')) {
      if (elliott.current_wave.includes('Wave 4 retrace')) {
        reason += ' — aligned with bearish Wave 4 retrace into FVG for Wave 5 drop';
      }
    }

    if (valid && risk > 0) {
      // Stop-limit: trigger slightly below entry so the limit order only fires when price confirms direction
      const stopLimitTrigger = +(entry - trueATR * 0.15).toFixed(8);
      result.short_setup = {
        status: 'TRADE',
        limit_entry: +entry.toFixed(8),
        stop_loss: +sl.toFixed(8),
        stop_limit: stopLimitTrigger,
        tp1: +tp1.toFixed(8),
        tp2: +tp2.toFixed(8),
        rr_tp1: +((entry - tp1) / risk).toFixed(2),
        rr_tp2: +((entry - tp2) / risk).toFixed(2),
        reason,
      };
    } else {
      result.short_setup = { status: 'NO TRADE', limit_entry: 0, stop_loss: 0, stop_limit: 0, tp1: 0, tp2: 0, rr_tp1: 0, rr_tp2: 0, reason };
    }
  } else {
    result.short_setup.reason = 'No valid unfilled bearish FVG near current price';
  }

  return result;
}

/* ── Full AI Analysis Pipeline ──────────────────────────── */
async function runAIAnalysis(symbols, progressCb, exchangeFilter = 'all') {
  // If exchange filter is set, only analyze coins from that exchange
  let pool = [...symbols];
  if (exchangeFilter === 'delta') pool = pool.filter(s => s.exchange === 'delta');
  else if (exchangeFilter === 'binance') pool = pool.filter(s => s.exchange === 'binance');

  // Pick top candidates: highest |change%| with decent volume
  const minVol = exchangeFilter === 'delta' ? 50000 : 500000;
  const maxCandidates = exchangeFilter === 'all' ? 15 : 20;
  const candidates = pool
    .filter(s => s.raw_symbol && s.volume_24h > minVol)
    .sort((a, b) => Math.abs(b.price_change_pct_24h ?? 0) - Math.abs(a.price_change_pct_24h ?? 0))
    .slice(0, maxCandidates);

  const topSetups = [];
  const excluded = [];

  for (let i = 0; i < candidates.length; i++) {
    const coin = candidates[i];
    progressCb && progressCb(`Analyzing ${coin.symbol} (${i + 1}/${candidates.length})…`);

    try {
      // Fetch 4H OHLCV — use appropriate API based on exchange
      let candles;
      if (coin.exchange === 'delta') {
        candles = await fetchDeltaOHLCV(coin.raw_symbol, '4h', 100);
      } else {
        candles = await fetchOHLCV(coin.raw_symbol, '4h', 100);
      }
      if (!candles || candles.length < 30) {
        excluded.push({ symbol: coin.symbol, reason: `Insufficient 4H candle data from ${coin.exchange}` });
        continue;
      }

      // Elliott Wave
      const elliott = detectElliottWave(candles);
      if (elliott.structure === 'unclear' && elliott.confidence === 'Low') {
        excluded.push({ symbol: coin.symbol, reason: `Elliott unclear: ${elliott.current_wave}` });
        continue;
      }

      // FVG Detection
      const fvgs = detectFVG(candles);
      if (fvgs.length === 0) {
        excluded.push({ symbol: coin.symbol, reason: 'No unfilled FVG found on 4H' });
        continue;
      }

      // Generate trade setups
      const setup = generateTradeSetup(coin.symbol, coin.current_price, elliott, fvgs, candles);
      topSetups.push(setup);
    } catch (err) {
      excluded.push({ symbol: coin.symbol, reason: `Analysis error: ${err.message}` });
    }

    // Small delay to respect Binance rate limits
    if (i < candidates.length - 1) await new Promise(r => setTimeout(r, 200));
  }

  return { top_setups: topSetups, excluded };
}

function App() {
  const [tab, setTab] = useState('table');
  const [alertsOpen, setAlertsOpen] = useState(false);

  const [lastUpdated, setLastUpdated] = useState(null);

  const alerts = useStore(s => s.symbols).filter(s => s.price_change_pct_24h != null && Math.abs(s.price_change_pct_24h) >= 8);

  const wsConnected = useBinanceWebSocket();

  // Load data function — fetch from both Binance + Delta Exchange
  const loadData = useCallback(async () => {
    setRefreshing(true);
    setError(null);
    try {
      // Fetch Binance + Delta + Delta Products in parallel
      const [binanceRows, deltaRows, deltaProducts] = await Promise.all([
        fetchTicker24h().catch(err => { console.warn('Binance fetch error:', err); return []; }),
        fetchDeltaTickers().catch(err => { console.warn('Delta fetch error:', err); return []; }),
        fetchDeltaProducts().catch(err => { console.warn('Delta products error:', err); return {}; }),
      ]);

      // Enrich delta rows with products data (leverage, fees, funding, etc.)
      for (const row of deltaRows) {
        const prod = deltaProducts[row.raw_symbol];
        if (prod) {
          row.annualized_funding = prod.annualized_funding;
          row.default_leverage = prod.default_leverage;
          row.initial_margin = prod.initial_margin;
          row.maintenance_margin = prod.maintenance_margin;
          row.maker_fee = prod.maker_fee;
          row.taker_fee = prod.taker_fee;
          row.contract_value = prod.contract_value;
          row.tick_size = prod.tick_size;
          row.funding_method = prod.funding_method;
          row.spot_index_symbol = prod.spot_index_symbol;
          row.constituent_exchanges = prod.constituent_exchanges;
        }
      }

      // Fetch sparklines for top 30 Binance coins in parallel
      const top30 = binanceRows.slice(0, 30);
      const sparkPromises = top30.map(r =>
        fetchKlines(r.raw_symbol, '1h', 24).then(data => ({ symbol: r.symbol, data })).catch(() => ({ symbol: r.symbol, data: [] }))
      );
      // Also fetch sparklines for top 20 Delta coins
      const deltaTop20 = deltaRows.slice(0, 20);
      const deltaSparkPromises = deltaTop20.map(r =>
        fetchDeltaKlines(r.raw_symbol, '1h', 24).then(data => ({ symbol: r.symbol, data })).catch(() => ({ symbol: r.symbol, data: [] }))
      );

      const [sparkResults, deltaSparkResults] = await Promise.all([
        Promise.all(sparkPromises),
        Promise.all(deltaSparkPromises),
      ]);
      const sparkMap = new Map([...sparkResults, ...deltaSparkResults].map(s => [s.symbol, s.data]));

      // Merge & deduplicate — if same base coin exists on both, keep both with exchange tag
      const allRows = [...binanceRows, ...deltaRows].map(r => ({
        ...r,
        sparkline: sparkMap.get(r.symbol) || r.sparkline,
      }));

      // Re-assign IDs
      allRows.forEach((r, i) => r.symbol_id = i + 1);

      setStore({ symbols: allRows });
      setLastUpdated(new Date());
    } catch (err) {
      setError(err.message);
      console.error('Failed to load data:', err);
    } finally {
      setRefreshing(false);
    }
  }, []);

  // Initial load
  useEffect(() => { loadData(); }, []);

  // Auto-refresh every 60s
  useEffect(() => {
    const interval = setInterval(loadData, 60000);
    return () => clearInterval(interval);
  }, [loadData]);

  return (
    <div className="flex h-screen overflow-hidden">
      {/* Left panel — filters */}
      <FilterPanel />

      {/* Center — scanner content */}
      <main className="flex-1 flex flex-col min-w-0 overflow-hidden">
        {/* Top bar */}
        <header className="flex items-center justify-between px-4 py-2.5 border-b border-zinc-800 bg-zinc-900/80 backdrop-blur-sm">
          <div className="flex items-center gap-3">
            <h1 className="text-sm font-bold text-zinc-100 tracking-tight">
              <span className="text-indigo-400">⚡</span> Crypto Market Scanner
            </h1>
            <div className={`w-2 h-2 rounded-full ${wsConnected ? 'bg-emerald-500 anim-pulse' : 'bg-red-500'}`}
              title={wsConnected ? 'WebSocket connected' : 'WebSocket disconnected'} />
            {lastUpdated && (
              <span className="text-[10px] text-zinc-600 hidden sm:inline">
                Updated {lastUpdated.toLocaleTimeString()}
              </span>
            )}
          </div>

          <div className="flex items-center gap-2">
            {/* AI Setup button */}
            <button onClick={() => setAiOpen(true)}
              className="flex items-center gap-1.5 text-xs px-3 py-1.5 rounded-md bg-purple-600/20 text-purple-300 border border-purple-500/30 hover:bg-purple-600/30 hover:border-purple-500/50 hover:text-purple-200 transition-all duration-200 active:scale-95"
              title="AI Trade Setup — Elliott Wave + FVG Analysis">
              <span className="text-sm">🤖</span>
              AI Setup
            </button>

            {/* Refresh button */}
            <button onClick={loadData} disabled={refreshing}
              className="flex items-center gap-1.5 text-xs px-3 py-1.5 rounded-md bg-indigo-600/20 text-indigo-300 border border-indigo-500/30 hover:bg-indigo-600/30 hover:border-indigo-500/50 hover:text-indigo-200 disabled:opacity-50 disabled:cursor-not-allowed transition-all duration-200 active:scale-95"
              title="Fetch live prices from Binance">
              <svg className={`w-3.5 h-3.5 ${refreshing ? 'anim-spin' : ''}`}
                fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
                <path strokeLinecap="round" strokeLinejoin="round"
                  d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
              </svg>
              {refreshing ? 'Refreshing…' : 'Refresh'}
            </button>

            {/* View toggle */}
            <div className="flex items-center gap-0.5 bg-zinc-800/80 rounded-lg p-0.5 border border-zinc-700/50">
              <button onClick={() => setTab('table')}
                className={`text-xs px-3 py-1.5 rounded-md transition-all duration-200 ${
                  tab === 'table' ? 'bg-zinc-600/80 text-zinc-100 shadow-sm' : 'text-zinc-500 hover:text-zinc-300'}`}>
                📊 Table
              </button>
              <button onClick={() => setTab('heatmap')}
                className={`text-xs px-3 py-1.5 rounded-md transition-all duration-200 ${
                  tab === 'heatmap' ? 'bg-zinc-600/80 text-zinc-100 shadow-sm' : 'text-zinc-500 hover:text-zinc-300'}`}>
                🔥 Heatmap
              </button>
            </div>

            {/* Mobile alerts toggle */}
            <button onClick={() => setAlertsOpen(v => !v)}
              className="lg:hidden relative text-zinc-400 hover:text-zinc-200 text-sm">
              🔔
              {alerts.length > 0 && (
                <span className="absolute -top-1 -right-2 text-[9px] bg-rose-600 text-white rounded-full px-1 min-w-[14px] text-center">
                  {alerts.length > 99 ? '99+' : alerts.length}
                </span>
              )}
            </button>
          </div>
        </header>

        {error && (
          <div className="mx-4 mt-2 flex items-center gap-2 p-3 rounded-lg bg-red-500/10 border border-red-500/20 text-red-400 text-xs">
            ⚠️ {error} — <button onClick={loadData} className="underline hover:text-red-300">Retry</button>
          </div>
        )}

        {/* Content area */}
        <div className="flex-1 overflow-y-auto">
          {tab === 'table' ? <ScannerTable /> : <Heatmap />}
        </div>
      </main>

      {/* Right panel — alerts feed */}
      <aside className={`w-72 border-l border-zinc-800 bg-zinc-900/50 flex-shrink-0
          max-lg:fixed max-lg:inset-y-0 max-lg:right-0 max-lg:z-40 max-lg:shadow-xl
          max-lg:transition-transform max-lg:duration-200
          ${alertsOpen ? 'max-lg:translate-x-0' : 'max-lg:translate-x-full'}`}>
        <AlertsFeed />
      </aside>

      {alertsOpen && (
        <div className="fixed inset-0 bg-black/40 z-30 lg:hidden" onClick={() => setAlertsOpen(false)} />
      )}

      <DetailModal />

      <AiSetupModal open={aiOpen} onClose={() => setAiOpen(false)} />
    </div>
  );
}

/* ── Mount ──────────────────────────────────────────────── */
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(React.StrictMode, null, React.createElement(App)));
</script>
</body>
</html>
